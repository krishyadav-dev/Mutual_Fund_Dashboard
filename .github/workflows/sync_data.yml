name: Daily Mutual Fund Data Sync

on:
  schedule:
    # Run daily at 00:30 UTC (6:00 AM IST)
    - cron: '30 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      # Allow writing commits and pushing changes back to the repository
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main # Ensure it pulls and pushes to the main branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy yfinance openpyxl xlrd

      - name: Run Ingestion Pipeline
        run: |
          python run_pipeline.py

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add data/ last_run_status.txt
          # Commit only if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "data: auto-sync mutual fund metrics and benchmarks [skip ci]"
            git push origin main
          else
            echo "No data changes detected. Skipping push."
          fi
